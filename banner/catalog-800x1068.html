<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=800, initial-scale=1" />
    <meta name="ad.size" content="width=800,height=1068" />
    <title>Дни года — catalog banner (safe-zone)</title>
    <style>
      * { box-sizing: border-box; }

      html, body {
        width: 800px;
        height: 1068px;
        margin: 0;
        overflow: hidden;
      }

      body {
        position: relative;
        background: #0a0a0a;
        font-family: -apple-system, 'SF Pro Display', 'Inter', sans-serif;
      }

      /* Soft ambient glows echoing the four mood colors. */
      .ambient {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 18% 12%, rgba(56, 132, 255, 0.16), transparent 42%),
          radial-gradient(circle at 84% 20%, rgba(38, 196, 112, 0.13), transparent 40%),
          radial-gradient(circle at 70% 48%, rgba(240, 184, 30, 0.10), transparent 38%),
          radial-gradient(circle at 22% 52%, rgba(240, 86, 86, 0.09), transparent 36%);
      }

      /* The year grid — generated by the script below. */
      .grid {
        position: absolute;
        left: 64px;
        top: 72px;
        width: 672px;
        display: grid;
        grid-template-columns: repeat(16, 1fr);
        gap: 14px;
      }

      .dot {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.14);
        background: transparent;
      }

      .dot--blue   { background: rgba(56, 132, 255, 0.9);  border-color: rgba(120, 174, 255, 0.95); box-shadow: 0 0 14px rgba(56, 132, 255, 0.45); }
      .dot--green  { background: rgba(38, 196, 112, 0.9);  border-color: rgba(110, 224, 160, 0.95); box-shadow: 0 0 14px rgba(38, 196, 112, 0.45); }
      .dot--red    { background: rgba(240, 86, 86, 0.9);   border-color: rgba(255, 150, 150, 0.95); box-shadow: 0 0 14px rgba(240, 86, 86, 0.4); }
      .dot--yellow { background: rgba(240, 184, 30, 0.92); border-color: rgba(255, 214, 110, 0.95); box-shadow: 0 0 14px rgba(240, 184, 30, 0.4); }

      /* "Today" — one emphasized ring mid-grid. */
      .dot--today {
        border-color: rgba(255, 255, 255, 0.95);
        box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.18), 0 0 22px rgba(255, 255, 255, 0.35);
      }

      /*
       * VK draws the app icon, title and description over roughly the lower
       * 40% of the image. Fade to solid background before that zone so the
       * platform text sits on a quiet, predictable surface.
       */
      .platform-safe-zone {
        position: absolute;
        left: 0;
        right: 0;
        top: 430px;
        bottom: 0;
        background: linear-gradient(
          180deg,
          rgba(10, 10, 10, 0) 0%,
          rgba(10, 10, 10, 0.12) 7%,
          rgba(10, 10, 10, 0.78) 22%,
          rgba(10, 10, 10, 0.97) 31%,
          #0a0a0a 38%,
          #0a0a0a 100%
        );
      }
    </style>
  </head>
  <body>
    <div class="ambient"></div>
    <div class="grid" id="grid"></div>
    <div class="platform-safe-zone"></div>
    <script>
      // Deterministic pattern: past days mostly filled with mood colors,
      // a bright "today" ring, future days empty — the app's core visual.
      const grid = document.getElementById('grid');
      const moods = ['blue', 'green', 'yellow', 'green', 'red', 'blue', 'green'];
      const ROWS = 9;
      const COLS = 16;
      const TODAY = 92; // ~day index where "filled" turns into "empty"
      let seed = 42;
      const rand = () => {
        seed = (seed * 9301 + 49297) % 233280;
        return seed / 233280;
      };
      for (let i = 0; i < ROWS * COLS; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        if (i < TODAY && rand() > 0.12) {
          dot.classList.add('dot--' + moods[Math.floor(rand() * moods.length)]);
        }
        if (i === TODAY) dot.classList.add('dot--today');
        grid.appendChild(dot);
      }
    </script>
  </body>
</html>
